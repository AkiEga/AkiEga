name: Update VS Code Extensions in README

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: {}

concurrency:
  group: update-vscode-extensions
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Fine-grained PAT with Copilot Requests permission (repo secret: PERSONAL_ACCESS_TOKEN)
      COPILOT_GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      OWNER: ${{ github.repository_owner }}
      REPO: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js environment
        uses: actions/setup-node@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Update README and create PR
        run: |
          python scripts/update_vscode_extensions.py
