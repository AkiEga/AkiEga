name: Update VS Code Extensions in README (Copilot CLI)

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: {}

concurrency:
  group: update-vscode-extensions
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Copilot CLI requires a PAT with Copilot Requests permission stored as a repo secret
      COPILOT_GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      OWNER: ${{ github.repository_owner }}
      REPO: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js environment
        uses: actions/setup-node@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run Copilot CLI to extract VS Code extensions
        run: |
          # Prompt Copilot CLI to produce a markdown bullet list of VS Code extensions
          copilot -p "Scan this repository and output a Markdown bullet list of VS Code extensions only. For each extension output a single line formatted: '- [repo-name](repo-url) — short description'. Only include extensions that have extension package.json (engines.vscode or contributes). Do not add extra commentary." > copilot_extensions.md

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip

      - name: Update README using Copilot output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/update_vscode_extensions.py --input copilot_extensions.md
