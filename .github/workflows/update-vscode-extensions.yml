name: Update VS Code Extensions in README

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: {}

concurrency:
  group: update-vscode-extensions
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Fine-grained PAT with Copilot Requests permission (repo secret: PERSONAL_ACCESS_TOKEN)
      COPILOT_GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      OWNER: ${{ github.repository_owner }}
      REPO: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js environment
        uses: actions/setup-node@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Update README and create PR
        run: |
          python scripts/update_vscode_extensions.py

      - name: Check for README changes
        id: changes
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create branch, commit and push
        if: steps.changes.outputs.changed == 'true'
        id: create_branch
        run: |
          BRANCH=update/vscode-extensions-$(date -u +%F-%H%M%S)
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b $BRANCH
          git add README.md
          git commit -m "Update VS Code Extensions list ($BRANCH)" || echo "no commit"
          git push origin $BRANCH

      - name: Create Pull Request (using gh CLI)
        if: steps.changes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.create_branch.outputs.branch }}
        run: |
          # Use the existing GITHUB_TOKEN (no interactive login / credential storage)
          gh pr create \
            --title "Update VS Code Extensions section" \
            --body "Automated update of the VS Code Extensions section.\n\nDetection criteria:\n- Repository name starts with \`vscode-extension\`\n- Repository topics contain \`vscode-extension\`" \
           --head "$BRANCH" --base main || echo "PR creation skipped or failed"
